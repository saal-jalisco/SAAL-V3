<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAL - Secundaria</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
<div class="container">
    <a href="nivel.html" class="boton-regresar">← Nivel educativo</a>
    <div class="header">
        <div class="logos">
            <img src="assets/cemej.png" alt="CEMEJ" class="logo-cemej">
        </div>
        <h1>📖 SAAL</h1>
        <p>Selecciona el grado de secundaria</p>
        <p class="subtitulo">Alumno: <span id="nombreDisplay"></span></p>
    </div>

    <div class="menu-grados">
        <button class="btn-grado" onclick="seleccionarGrado(1)">🎓 1° secundaria</button>
        <button class="btn-grado" onclick="seleccionarGrado(2)">🎓 2° secundaria</button>
        <button class="btn-grado" onclick="seleccionarGrado(3)">🎓 3° secundaria</button>
    </div>
</div>
<script>
    document.getElementById('nombreDisplay').textContent = localStorage.getItem('nombreAlumno') || 'No especificado';

    function seleccionarGrado(grado) {
        localStorage.setItem('grado', grado);
        localStorage.setItem('nivel', 'secundaria');
        window.location.href = `grado${grado}sec.html`;
    }
</script>
</body>
</html>
