<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAL - Aplicador</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
<div class="container">
    <a href="index.html" class="boton-regresar">← Menú principal</a>
    <div class="header">
        <div class="logos">
            <img src="assets/cemej.png" alt="CEMEJ" class="logo-cemej">
        </div>
        <h1>📖 SAAL</h1>
        <p>Datos del alumno y aplicador</p>
    </div>

    <form id="formDatos" class="form-datos" onsubmit="return guardarDatos()">
        <div class="campo">
            <label>Nombre completo del alumno *</label>
            <input type="text" id="nombreAlumno" placeholder="Escribe el nombre completo" required>
        </div>

        <div class="campo">
            <label>CURP del alumno</label>
            <input type="text" id="curpAlumno" placeholder="Escribe la CURP (18 caracteres)" maxlength="18">
        </div>

        <div class="campo">
            <label>Turno</label>
            <select id="turno">
                <option value="">Selecciona el turno</option>
                <option value="matutino">Matutino</option>
                <option value="vespertino">Vespertino</option>
            </select>
        </div>

        <div class="campo">
            <label>¿Quién aplica la evaluación? *</label>
            <select id="aplicador" required>
                <option value="">Selecciona el aplicador</option>
                <option value="docente">Docente</option>
                <option value="director">Director</option>
                <option value="supervisor">Supervisor</option>
                <option value="padre">Padre de familia</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <div class="campo">
            <label>¿Desde dónde lee el alumno? *</label>
            <div class="opciones-dispositivo" required>
                <label><input type="radio" name="dispositivo" value="chromebook" required> 💻 Chromebook</label>
                <label><input type="radio" name="dispositivo" value="celular"> 📱 Celular</label>
                <label><input type="radio" name="dispositivo" value="impreso"> 🖨️ Impreso</label>
            </div>
        </div>

        <div class="campo">
            <label>CCT de la escuela (opcional)</label>
            <input type="text" id="cct" placeholder="Ejemplo: 14DPR1234A">
        </div>

        <div class="campo">
            <label>Zona escolar (opcional)</label>
            <input type="text" id="zonaEscolar" placeholder="Ejemplo: Zona 05">
        </div>

        <button type="submit" class="boton-continuar">✅ Continuar a la evaluación</button>
    </form>
</div>

<script>
    function guardarDatos() {
        const nombre = document.getElementById('nombreAlumno').value.trim();
        const aplicador = document.getElementById('aplicador').value;
        const dispositivo = document.querySelector('input[name="dispositivo"]:checked');

        if (!nombre) { alert("Escribe el nombre del alumno."); return false; }
        if (!aplicador) { alert("Selecciona quién aplica la evaluación."); return false; }
        if (!dispositivo) { alert("Selecciona desde dónde leerá el alumno."); return false; }

        localStorage.setItem('nombreAlumno', nombre);
        localStorage.setItem('curp', document.getElementById('curpAlumno').value.trim());
        localStorage.setItem('turno', document.getElementById('turno').value);
        localStorage.setItem('aplicador', aplicador);
        localStorage.setItem('dispositivo', dispositivo.value);
        localStorage.setItem('cct', document.getElementById('cct').value.trim());
        localStorage.setItem('zonaEscolar', document.getElementById('zonaEscolar').value.trim());

        window.location.href = 'nivel.html';
        return false;
    }

    window.onload = function() {
        if (localStorage.getItem('nombreAlumno')) {
            document.getElementById('nombreAlumno').value = localStorage.getItem('nombreAlumno');
            document.getElementById('curpAlumno').value = localStorage.getItem('curp') || '';
            document.getElementById('turno').value = localStorage.getItem('turno') || '';
            document.getElementById('aplicador').value = localStorage.getItem('aplicador') || '';
            document.getElementById('cct').value = localStorage.getItem('cct') || '';
            document.getElementById('zonaEscolar').value = localStorage.getItem('zonaEscolar') || '';
            const dispositivo = localStorage.getItem('dispositivo');
            if (dispositivo) {
                document.querySelector(`input[name="dispositivo"][value="${dispositivo}"]`).checked = true;
            }
        }
    };
</script>
</body>
</html>
