<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAAL - Datos del alumno</title>
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        .texto-ayuda {
            font-size: 0.75rem;
            color: #777;
            margin-top: 4px;
        }
        .campo.obligatorio label::after {
            content: " *";
            color: #e74c3c;
            font-weight: bold;
        }
        .campo input:invalid, .campo select:invalid {
            border-color: #e74c3c;
        }
        .campo input:valid, .campo select:valid {
            border-color: #2ecc71;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="boton-regresar">← Menú principal</a>
    <div class="header">
        <div class="logos">
            <img src="assets/cemej.png" alt="CEMEJ" class="logo-cemej">
        </div>
        <h1>📖 SAAL</h1>
        <p>Datos del alumno y aplicador</p>
    </div>

    <form id="formDatos" class="form-datos" onsubmit="return guardarDatos()" novalidate>
        <!-- Nombre del alumno (obligatorio) -->
        <div class="campo obligatorio">
            <label>Nombre completo del alumno</label>
            <input type="text" id="nombreAlumno" placeholder="Escribe el nombre completo" required>
        </div>

        <!-- CURP (obligatorio) -->
       <div class="campo obligatorio">
    <label>CURP del alumno</label>
    <input type="text" id="curpAlumno" placeholder="Escribe la CURP (18 caracteres)" maxlength="18" required>
</div>

        <!-- Turno (opcional) -->
        <div class="campo">
            <label>Turno</label>
            <select id="turno">
                <option value="">Selecciona el turno</option>
                <option value="matutino">Matutino</option>
                <option value="vespertino">Vespertino</option>
            </select>
        </div>

        <!-- Aplicador (obligatorio) -->
        <div class="campo obligatorio">
            <label>¿Quién aplica la evaluación?</label>
            <select id="aplicador" required>
                <option value="">Selecciona el aplicador</option>
                <option value="docente">Docente</option>
                <option value="director">Director</option>
                <option value="supervisor">Supervisor</option>
                <option value="padre">Padre de familia</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <!-- Dispositivo (obligatorio) -->
        <div class="campo obligatorio">
            <label>¿Desde dónde lee el alumno?</label>
            <div class="opciones-dispositivo" required>
                <label><input type="radio" name="dispositivo" value="chromebook" required> 💻 Chromebook</label>
                <label><input type="radio" name="dispositivo" value="celular"> 📱 Celular</label>
                <label><input type="radio" name="dispositivo" value="impreso"> 🖨️ Impreso</label>
            </div>
        </div>

        <!-- CCT (obligatorio) -->
        <div class="campo obligatorio">
            <label>CCT de la escuela</label>
            <input type="text" id="cct" placeholder="Ejemplo: 14DPR1234A" required>
        </div>

        <!-- Zona escolar (opcional) -->
        <div class="campo">
            <label>Zona escolar (opcional)</label>
            <input type="text" id="zonaEscolar" placeholder="Ejemplo: Zona 05">
            <p class="texto-ayuda">ℹ️ Si no conoces la zona, puedes dejarlo en blanco.</p>
        </div>

        <button type="submit" class="boton-continuar">✅ Continuar a la evaluación</button>
    </form>
</div>

<script>
    function guardarDatos() {
        // === VALIDACIÓN DE NOMBRE ===
        const nombre = document.getElementById('nombreAlumno').value.trim();
        if (!nombre) {
            alert("❌ Escribe el nombre completo del alumno.");
            document.getElementById('nombreAlumno').focus();
            return false;
        }

        // === VALIDACIÓN DE CURP ===
        const curp = document.getElementById('curpAlumno').value.trim().toUpperCase();
        if (!curp) {
            alert("❌ Escribe la CURP del alumno.");
            document.getElementById('curpAlumno').focus();
            return false;
        }
        if (curp.length !== 18) {
            alert("❌ La CURP debe tener 18 caracteres. Tiene " + curp.length + ".");
            document.getElementById('curpAlumno').focus();
            return false;
        }
        // Verificar que la CURP solo tenga letras y números
        if (!/^[A-Z0-9]+$/.test(curp)) {
            alert("❌ La CURP solo debe contener letras mayúsculas y números.");
            document.getElementById('curpAlumno').focus();
            return false;
        }

        // === VALIDACIÓN DE APLICADOR ===
        const aplicador = document.getElementById('aplicador').value;
        if (!aplicador) {
            alert("❌ Selecciona quién aplica la evaluación.");
            document.getElementById('aplicador').focus();
            return false;
        }

        // === VALIDACIÓN DE DISPOSITIVO ===
        const dispositivo = document.querySelector('input[name="dispositivo"]:checked');
        if (!dispositivo) {
            alert("❌ Selecciona desde dónde leerá el alumno.");
            return false;
        }

        // === VALIDACIÓN DE CCT ===
        const cct = document.getElementById('cct').value.trim();
        if (!cct) {
            alert("❌ Escribe el CCT de la escuela.");
            document.getElementById('cct').focus();
            return false;
        }

        // === GUARDAR EN LOCALSTORAGE ===
        localStorage.setItem('nombreAlumno', nombre);
        localStorage.setItem('curp', curp);
        localStorage.setItem('turno', document.getElementById('turno').value);
        localStorage.setItem('aplicador', aplicador);
        localStorage.setItem('dispositivo', dispositivo.value);
        localStorage.setItem('cct', cct);
        localStorage.setItem('zonaEscolar', document.getElementById('zonaEscolar').value.trim());

        // === REDIRIGIR A INDICACIONES ===
        window.location.href = 'indicaciones.html';
        return false;
    }

    // === CARGAR DATOS GUARDADOS (SI EXISTEN) ===
    window.onload = function() {
        if (localStorage.getItem('nombreAlumno')) {
            document.getElementById('nombreAlumno').value = localStorage.getItem('nombreAlumno');
            document.getElementById('curpAlumno').value = localStorage.getItem('curp') || '';
            document.getElementById('turno').value = localStorage.getItem('turno') || '';
            document.getElementById('aplicador').value = localStorage.getItem('aplicador') || '';
            document.getElementById('cct').value = localStorage.getItem('cct') || '';
            document.getElementById('zonaEscolar').value = localStorage.getItem('zonaEscolar') || '';
            const dispositivo = localStorage.getItem('dispositivo');
            if (dispositivo) {
                document.querySelector(`input[name="dispositivo"][value="${dispositivo}"]`).checked = true;
            }
        }
    };
</script>
</body>
</html>
